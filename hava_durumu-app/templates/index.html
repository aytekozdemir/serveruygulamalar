<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hava Durumu</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin-top: 50px; background-color: #f0f8ff; }
        .kutu { background-color: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; min-width: 300px; }
        input { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .loading { color: #888; font-style: italic; }
    </style>
</head>
<body>

    <div class="kutu">
        <h1>Hava Durumu</h1>
        
        <input type="text" id="sehirInput" placeholder="Şehir giriniz..." value="İstanbul">
        <button onclick="veriyiCek()">Sorgula</button>

        <div id="sonucDiv" style="margin-top: 20px;">
            <p class="loading">Sayfa yükleniyor...</p>"
        </div>
    </div>

    <script>
        // Sayfa ilk açıldığında çalışacak fonksiyon
        window.onload = function() {
            veriyiCek();
        };

        function veriyiCek() {
            const sehir = document.getElementById('sehirInput').value;
            const sonuc = document.getElementById('sonucDiv');
            
            sonuc.innerHTML = '<p class="loading">Veri getiriliyor...</p>';

            // DİKKAT: En kritik nokta burası! localhost yazmıyoruz, sadece /api/durum yazıyoruz.
            fetch(`/api/durum?sehir=${sehir}`)
                .then(response => response.json())
                .then(data => {
                    // Gelen veriyi ekrana yazdırıyoruz
                    sonuc.innerHTML = `
                        <h2 style="color: #333;">${data.sehir}</h2>
                        <h1 style="color: #ff8c00; font-size: 48px; margin: 10px 0;">${data.sicaklik}°C</h1>
                        <p style="font-size: 20px; color: #555;">${data.durum}</p>
                    `;
                })
                .catch(error => {
                    sonuc.innerHTML = '<p style="color: red;">Sunucuya bağlanılamadı!</p>';
                    console.error("Hata:", error);
                });
        }
    </script>
</body>
</html>
